<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Web App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📝 To-Do Web Application</h1>
        <p>Stay organized and productive every day</p>
    </div>

    <!-- Task Input -->

    <div class="task-form">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter a new task...">

        <select id="priority">

            <option value="High">🔴 High</option>

            <option value="Medium">🟡 Medium</option>

            <option value="Low">🟢 Low</option>

        </select>

        <input type="date" id="date">

        <input type="time" id="time">

        <button id="addTask">
            <i class="fas fa-plus"></i>
            Add Task
        </button>

    </div>

    <!-- Search -->

    <div class="search-box">

        <input
            type="text"
            id="search"
            placeholder="🔍 Search tasks...">

    </div>

    <!-- Filters -->

    <div class="filters">

        <button class="filter active" data-filter="all">
            All
        </button>

        <button class="filter" data-filter="pending">
            Pending
        </button>

        <button class="filter" data-filter="completed">
            Completed
        </button>

    </div>

    <!-- Statistics -->

    <div class="stats">

        <div class="card">
            <h2 id="total">0</h2>
            <p>Total Tasks</p>
        </div>

        <div class="card">
            <h2 id="completed">0</h2>
            <p>Completed</p>
        </div>

        <div class="card">
            <h2 id="pending">0</h2>
            <p>Pending</p>
        </div>

    </div>

    <!-- Task List -->

    <div id="taskList">

    </div>

    <!-- Clear Button -->

    <button id="clearAll">

        <i class="fas fa-trash"></i>

        Clear All Tasks

    </button>

</div>

<script src="script.js"></script>

</body>

</html>
